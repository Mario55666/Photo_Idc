/* =====================================================================
   MODAL: NIVELES (estilo Photoshop)
   ===================================================================== */
function modalLevels() {
  if (!activeLayer()) return showToast('No hay capa activa','error');
  if (activeLayer().locked) return showToast(`Capa "${activeLayer().name}" bloqueada`,'error');
  const L = activeLayer();
  const original = L.ctx.getImageData(0,0,L.canvas.width,L.canvas.height);
  const hist = _computeHistogram(original);

  const params = { channel: 'rgb', inBlack: 0, inWhite: 255, gamma: 1.00, outBlack: 0, outWhite: 255 };

  const html = `
    <div class="modal-header"><h2>Niveles</h2><button class="modal-close">×</button></div>
    <div class="modal-body" style="min-width:380px">
      <div class="lev-row">
        <label>Canal</label>
        <select id="lvCh">
          <option value="rgb">RGB</option>
          <option value="r">Rojo</option>
          <option value="g">Verde</option>
          <option value="b">Azul</option>
          <option value="l">Luminosidad (solo histograma)</option>
        </select>
      </div>
      <div class="lev-histogram-wrap">
        <canvas id="lvHist" width="280" height="100"></canvas>
        <div class="lev-input-bar">
          <input type="range" id="lvInB" min="0" max="254" value="0" class="lv-r lv-black">
          <input type="range" id="lvInW" min="1" max="255" value="255" class="lv-r lv-white">
        </div>
        <div class="lev-input-row">
          <input type="number" id="lvInBn" min="0" max="254" value="0">
          <input type="number" id="lvGamma" min="0.1" max="9.99" step="0.01" value="1.00">
          <input type="number" id="lvInWn" min="1" max="255" value="255">
        </div>
      </div>
      <div class="lev-row" style="margin-top:14px">
        <label>Salida</label>
      </div>
      <div class="lev-output-bar">
        <input type="range" id="lvOutB" min="0" max="254" value="0" class="lv-r">
        <input type="range" id="lvOutW" min="1" max="255" value="255" class="lv-r">
      </div>
      <div class="lev-output-row">
        <input type="number" id="lvOutBn" min="0" max="254" value="0">
        <input type="number" id="lvOutWn" min="1" max="255" value="255">
      </div>
    </div>
    <div class="modal-footer">
      <button class="modal-btn" data-auto>Auto</button>
      <button class="modal-btn" data-reset>Restablecer</button>
      <span style="flex:1"></span>
      <button class="modal-btn" data-cancel>Cancelar</button>
      <button class="modal-btn primary" data-ok>Aplicar</button>
    </div>`;

  showModal(html, {
    onMount(m, close) {
      const histCanvas = m.querySelector('#lvHist');
      const hctx = histCanvas.getContext('2d');
      const elCh = m.querySelector('#lvCh');
      const elInB = m.querySelector('#lvInB');
      const elInW = m.querySelector('#lvInW');
      const elInBn= m.querySelector('#lvInBn');
      const elInWn= m.querySelector('#lvInWn');
      const elGamma=m.querySelector('#lvGamma');
      const elOutB= m.querySelector('#lvOutB');
      const elOutW= m.querySelector('#lvOutW');
      const elOutBn=m.querySelector('#lvOutBn');
      const elOutWn=m.querySelector('#lvOutWn');

      const drawHist = () => {
        const ch = elCh.value;
        const data = ch==='rgb' ? hist.l : hist[ch];
        const W = histCanvas.width, H = histCanvas.height;
        hctx.clearRect(0,0,W,H);
        // Fondo
        hctx.fillStyle = '#1a1a1a';
        hctx.fillRect(0,0,W,H);
        // Barras
        const max = Math.max(...data);
        const color = ch==='r'?'#ff5050':ch==='g'?'#55cc55':ch==='b'?'#5577ff':'#cccccc';
        hctx.fillStyle = color;
        hctx.globalAlpha = 0.85;
        for (let x=0; x<256; x++) {
          const h = max>0 ? (data[x] / max) * (H-2) : 0;
          const px = (x/256) * W;
          const pw = W/256 + 0.5;
          hctx.fillRect(px, H - h, pw, h);
        }
        hctx.globalAlpha = 1;
        // Marcadores de input
        const inB = +elInBn.value, inW = +elInWn.value, gamma = +elGamma.value;
        // Curva de gamma encima
        hctx.strokeStyle = 'rgba(243,161,0,0.85)';
        hctx.lineWidth = 1.5;
        hctx.beginPath();
        for (let x=0; x<=W; x++) {
          const i = (x/W) * 255;
          let v = (i - inB) / Math.max(1, inW - inB);
          v = Math.max(0, Math.min(1, v));
          v = Math.pow(v, 1/Math.max(0.01,gamma));
          const y = H - v*H;
          if (x===0) hctx.moveTo(x,y); else hctx.lineTo(x,y);
        }
        hctx.stroke();
      };

      const sync = (src) => {
        // Mantener consistencia entre slider y number; impedir cruces
        let inB = +elInBn.value, inW = +elInWn.value;
        let outB= +elOutBn.value, outW = +elOutWn.value;
        let gamma = +elGamma.value;
        if (inW <= inB) { if (src==='inB') inW = inB+1; else inB = inW-1; }
        if (outW <= outB) { if (src==='outB') outW = outB+1; else outB = outW-1; }
        gamma = Math.max(0.1, Math.min(9.99, gamma||1));
        elInBn.value = inB; elInB.value = inB;
        elInWn.value = inW; elInW.value = inW;
        elOutBn.value= outB; elOutB.value= outB;
        elOutWn.value= outW; elOutW.value= outW;
        elGamma.value= gamma.toFixed(2);
        params.channel = elCh.value === 'l' ? 'rgb' : elCh.value;
        params.inBlack=inB; params.inWhite=inW; params.gamma=gamma;
        params.outBlack=outB; params.outWhite=outW;
        // Apply to canvas
        L.ctx.putImageData(original, 0, 0);
        const img = L.ctx.getImageData(0,0,L.canvas.width,L.canvas.height);
        Filters.levels(img, params);
        L.ctx.putImageData(img, 0, 0);
        redraw();
        drawHist();
      };

      // Bind sliders ↔ numbers
      [['lvInB','lvInBn','inB'],['lvInW','lvInWn','inW'],
       ['lvOutB','lvOutBn','outB'],['lvOutW','lvOutWn','outW']].forEach(([s,n,k])=>{
        m.querySelector('#'+s).oninput = ()=>{ m.querySelector('#'+n).value = m.querySelector('#'+s).value; sync(k); };
        m.querySelector('#'+n).oninput = ()=>{ m.querySelector('#'+s).value = m.querySelector('#'+n).value; sync(k); };
      });
      elGamma.oninput = ()=>sync('gamma');
      elCh.onchange = ()=>sync('ch');

      m.querySelector('[data-auto]').onclick = () => {
        // Auto: estira a percentil 0.5%-99.5% del canal
        const ch = elCh.value === 'l' ? 'rgb' : elCh.value;
        const arr = ch==='rgb' ? hist.l : hist[ch];
        const total = arr.reduce((a,b)=>a+b,0);
        const lo = total*0.005, hi = total*0.995;
        let cum=0, b=0, w=255;
        for (let i=0; i<256; i++) { cum+=arr[i]; if (cum>=lo) { b=i; break; } }
        cum=0;
        for (let i=255; i>=0; i--) { cum+=arr[i]; if (cum>=(total-hi)) { w=i; break; } }
        if (w<=b) w=b+1;
        elInBn.value=b; elInB.value=b; elInWn.value=w; elInW.value=w;
        elGamma.value='1.00';
        sync();
      };
      m.querySelector('[data-reset]').onclick = () => {
        elInBn.value=0; elInB.value=0;
        elInWn.value=255; elInW.value=255;
        elOutBn.value=0; elOutB.value=0;
        elOutWn.value=255; elOutW.value=255;
        elGamma.value='1.00';
        sync();
      };
      m.querySelector('[data-cancel]').onclick = () => {
        L.ctx.putImageData(original, 0, 0); redraw(); close(null);
      };
      m.querySelector('[data-ok]').onclick = () => {
        historyPush('Niveles');
        recordOp('filter.levels', { ...params });
        close(true);
      };

      sync();
    }
  });
}

/* =====================================================================
   MODAL: CURVAS (estilo Photoshop, con puntos arrastrables)
   ===================================================================== */
function modalCurves() {
  if (!activeLayer()) return showToast('No hay capa activa','error');
  if (activeLayer().locked) return showToast(`Capa "${activeLayer().name}" bloqueada`,'error');
  const L = activeLayer();
  const original = L.ctx.getImageData(0,0,L.canvas.width,L.canvas.height);
  const hist = _computeHistogram(original);

  // Estado por canal independiente
  const curves = {
    rgb: [[0,0],[255,255]],
    r:   [[0,0],[255,255]],
    g:   [[0,0],[255,255]],
    b:   [[0,0],[255,255]],
  };
  let currentCh = 'rgb';

  const html = `
    <div class="modal-header"><h2>Curvas</h2><button class="modal-close">×</button></div>
    <div class="modal-body" style="min-width:380px">
      <div class="lev-row">
        <label>Canal</label>
        <select id="cvCh">
          <option value="rgb">RGB</option>
          <option value="r">Rojo</option>
          <option value="g">Verde</option>
          <option value="b">Azul</option>
        </select>
        <span style="flex:1"></span>
        <button class="modal-btn" id="cvResetCh" style="padding:3px 8px">Resetear canal</button>
      </div>
      <div class="curves-wrap">
        <canvas id="cvCanvas" width="280" height="280"></canvas>
        <div class="curves-readout">
          <span>Entrada: <b id="cvIn">—</b></span>
          <span>Salida: <b id="cvOut">—</b></span>
        </div>
      </div>
      <div style="font-size:10px; color:var(--text-faint); margin-top:6px">
        Click en la curva para añadir un punto · arrastrar para mover · doble click para eliminar.
      </div>
    </div>
    <div class="modal-footer">
      <button class="modal-btn" data-reset-all>Restablecer todo</button>
      <span style="flex:1"></span>
      <button class="modal-btn" data-cancel>Cancelar</button>
      <button class="modal-btn primary" data-ok>Aplicar</button>
    </div>`;

  showModal(html, {
    onMount(m, close) {
      const canvas = m.querySelector('#cvCanvas');
      const cctx = canvas.getContext('2d');
      const W = canvas.width, H = canvas.height;
      const PAD = 0; // toda el área es la curva
      const elCh = m.querySelector('#cvCh');
      const elIn = m.querySelector('#cvIn');
      const elOut= m.querySelector('#cvOut');

      let dragIdx = -1;
      let hoverIdx = -1;

      const x2v = x => Math.round((x/W) * 255);
      const y2v = y => Math.round(255 - (y/H) * 255);
      const v2x = v => (v/255) * W;
      const v2y = v => H - (v/255) * H;

      const draw = () => {
        cctx.clearRect(0,0,W,H);
        // Fondo
        cctx.fillStyle = '#1a1a1a';
        cctx.fillRect(0,0,W,H);
        // Histograma del canal actual
        const histCh = currentCh==='rgb' ? hist.l : hist[currentCh];
        const hmax = Math.max(...histCh);
        cctx.fillStyle = 'rgba(180,180,180,0.18)';
        for (let x=0; x<256; x++) {
          const h = hmax>0 ? (histCh[x]/hmax) * H : 0;
          const px = (x/256) * W;
          const pw = W/256 + 0.5;
          cctx.fillRect(px, H-h, pw, h);
        }
        // Cuadrícula
        cctx.strokeStyle = 'rgba(255,255,255,0.08)';
        cctx.lineWidth = 1;
        for (let i=1; i<4; i++) {
          const x = (i/4)*W;
          const y = (i/4)*H;
          cctx.beginPath(); cctx.moveTo(x,0); cctx.lineTo(x,H); cctx.stroke();
          cctx.beginPath(); cctx.moveTo(0,y); cctx.lineTo(W,y); cctx.stroke();
        }
        // Diagonal de referencia
        cctx.strokeStyle = 'rgba(255,255,255,0.12)';
        cctx.beginPath(); cctx.moveTo(0,H); cctx.lineTo(W,0); cctx.stroke();
        // Curva
        const pts = curves[currentCh].slice().sort((a,b)=>a[0]-b[0]);
        const lut = _buildCurveLUT(pts);
        const color = currentCh==='r'?'#ff6060':currentCh==='g'?'#60dd60':currentCh==='b'?'#6080ff':'#f3a100';
        cctx.strokeStyle = color;
        cctx.lineWidth = 2;
        cctx.beginPath();
        for (let x=0; x<=W; x++) {
          const v = Math.round((x/W)*255);
          const y = v2y(lut[Math.min(255,v)]);
          if (x===0) cctx.moveTo(x,y); else cctx.lineTo(x,y);
        }
        cctx.stroke();
        // Puntos de control
        pts.forEach((p, i) => {
          cctx.beginPath();
          cctx.arc(v2x(p[0]), v2y(p[1]), i===hoverIdx?6:4, 0, Math.PI*2);
          cctx.fillStyle = i===hoverIdx?'#fff':color;
          cctx.fill();
          cctx.strokeStyle = '#000';
          cctx.lineWidth = 1;
          cctx.stroke();
        });
      };

      const apply = () => {
        L.ctx.putImageData(original, 0, 0);
        // Aplica RGB primero, luego cada canal
        const img = L.ctx.getImageData(0,0,L.canvas.width,L.canvas.height);
        if (!_isIdentity(curves.rgb)) Filters.curves(img, { channel:'rgb', points: curves.rgb });
        if (!_isIdentity(curves.r))   Filters.curves(img, { channel:'r',   points: curves.r });
        if (!_isIdentity(curves.g))   Filters.curves(img, { channel:'g',   points: curves.g });
        if (!_isIdentity(curves.b))   Filters.curves(img, { channel:'b',   points: curves.b });
        L.ctx.putImageData(img, 0, 0);
        redraw();
      };

      const findPointAt = (x, y) => {
        const pts = curves[currentCh];
        for (let i=0; i<pts.length; i++) {
          const px = v2x(pts[i][0]);
          const py = v2y(pts[i][1]);
          if ((px-x)*(px-x) + (py-y)*(py-y) < 81) return i;
        }
        return -1;
      };

      const getMouse = (e) => {
        const r = canvas.getBoundingClientRect();
        return {
          x: Math.max(0, Math.min(W, e.clientX - r.left)),
          y: Math.max(0, Math.min(H, e.clientY - r.top)),
        };
      };

      canvas.onpointerdown = (e) => {
        const {x,y} = getMouse(e);
        canvas.setPointerCapture(e.pointerId);
        const idx = findPointAt(x,y);
        if (idx >= 0) {
          dragIdx = idx;
        } else {
          // Añadir nuevo punto
          const newPt = [x2v(x), y2v(y)];
          curves[currentCh].push(newPt);
          curves[currentCh].sort((a,b)=>a[0]-b[0]);
          dragIdx = curves[currentCh].findIndex(p => p[0]===newPt[0] && p[1]===newPt[1]);
        }
        draw(); apply();
      };
      canvas.onpointermove = (e) => {
        const {x,y} = getMouse(e);
        elIn.textContent = x2v(x);
        elOut.textContent = y2v(y);
        if (dragIdx >= 0) {
          const pts = curves[currentCh];
          const isFirst = dragIdx === 0;
          const isLast  = dragIdx === pts.length-1;
          let nx = x2v(x), ny = y2v(y);
          if (isFirst) nx = 0;
          else if (isLast) nx = 255;
          else {
            const left = pts[dragIdx-1][0]+1;
            const right = pts[dragIdx+1][0]-1;
            nx = Math.max(left, Math.min(right, nx));
          }
          pts[dragIdx] = [nx, ny];
          draw(); apply();
        } else {
          const newHover = findPointAt(x,y);
          if (newHover !== hoverIdx) { hoverIdx = newHover; draw(); }
        }
      };
      canvas.onpointerup = (e) => {
        canvas.releasePointerCapture(e.pointerId);
        dragIdx = -1;
      };
      canvas.ondblclick = (e) => {
        const {x,y} = getMouse(e);
        const idx = findPointAt(x,y);
        const pts = curves[currentCh];
        if (idx >= 0 && idx !== 0 && idx !== pts.length-1) {
          pts.splice(idx,1);
          draw(); apply();
        }
      };

      elCh.onchange = () => { currentCh = elCh.value; draw(); };
      m.querySelector('#cvResetCh').onclick = () => {
        curves[currentCh] = [[0,0],[255,255]];
        draw(); apply();
      };
      m.querySelector('[data-reset-all]').onclick = () => {
        ['rgb','r','g','b'].forEach(k => curves[k] = [[0,0],[255,255]]);
        draw(); apply();
      };
      m.querySelector('[data-cancel]').onclick = () => {
        L.ctx.putImageData(original, 0, 0); redraw(); close(null);
      };
      m.querySelector('[data-ok]').onclick = () => {
        historyPush('Curvas');
        // Graba como una sola operación con todos los canales
        recordOp('filter.curves_all', { curves: JSON.parse(JSON.stringify(curves)) });
        close(true);
      };

      draw();
    }
  });
}

function _isIdentity(pts) {
  return pts.length === 2
      && pts[0][0]===0 && pts[0][1]===0
      && pts[1][0]===255 && pts[1][1]===255;
}

/* ---------- PWA / SERVICE WORKER ---------- */
function downloadServiceWorker() {
  if (!window.__IDC_SW__) { showToast('Código del SW no disponible', 'error'); return; }
  const blob = new Blob([window.__IDC_SW__], { type: 'text/javascript' });
  const url = URL.createObjectURL(blob);
  downloadDataURL(url, 'sw.js');
  setTimeout(()=>URL.revokeObjectURL(url), 1000);
  showToast('sw.js descargado · colócalo junto a este HTML y recarga', 'success');
}

/* ---------- ENLACES EXTERNOS ---------- */
function openExternal(url) {
  try { window.open(url, '_blank', 'noopener,noreferrer'); }
  catch(e) { showToast('No se pudo abrir el enlace', 'error'); }
}

function modalAIHelp() {
  const html = `
    <div class="modal-header"><h2>Generación de imágenes con IA</h2><button class="modal-close">×</button></div>
    <div class="modal-body" style="max-width:560px">
      <p style="margin:0 0 12px 0"><strong>Nano Banana</strong> es el nombre coloquial del modelo <em>Gemini 2.5 Flash Image</em> de Google, uno de los generadores y editores de imagen por IA más potentes disponibles hoy.</p>
      <p style="margin:0 0 12px 0">Para usarlo de forma <strong>gratuita y oficial</strong>, Google ofrece dos vías:</p>
      <ul style="margin:0 0 14px 18px; padding:0">
        <li style="margin-bottom:6px"><strong>Google AI Studio</strong> — entorno para experimentar con prompts y descargar resultados. Gratis con cuenta Google y cuotas generosas.</li>
        <li style="margin-bottom:6px"><strong>App Gemini</strong> — interfaz conversacional con generación de imágenes integrada.</li>
      </ul>
      <p style="margin:0 0 12px 0; padding:10px; background:#3a2a1a; border-left:3px solid var(--idc-orange); border-radius:4px; font-size:13px">
        <strong>Aviso académico:</strong> evita sitios de terceros que prometen "Nano Banana gratis sin login" — suelen ser espejos no autorizados, comprometen tus datos o pueden desaparecer en cualquier momento. Para uso pedagógico con estudiantes, mantente en los servicios oficiales.
      </p>
      <p style="margin:0 0 8px 0"><strong>Flujo sugerido en clase:</strong></p>
      <ol style="margin:0 0 12px 18px; padding:0; font-size:13px; line-height:1.6">
        <li>Genera la imagen en AI Studio o Gemini.</li>
        <li>Descárgala como PNG o JPG.</li>
        <li>Ábrela aquí con <strong>Archivo → Abrir imagen</strong> y trabájala con capas, filtros y selecciones.</li>
      </ol>
      <div style="display:flex; gap:8px; flex-wrap:wrap">
        <button class="modal-btn primary" data-go="ai">Abrir AI Studio</button>
        <button class="modal-btn" data-go="gem">Abrir Gemini</button>
      </div>
    </div>
    <div class="modal-footer"><button class="modal-btn" data-ok>Cerrar</button></div>
  `;
  showModal(html, { onMount(m, close) {
    m.querySelector('[data-ok]').onclick = ()=>close(true);
    m.querySelector('[data-go="ai"]').onclick = ()=>{ openExternal('https://aistudio.google.com/'); close(true); };
    m.querySelector('[data-go="gem"]').onclick = ()=>{ openExternal('https://gemini.google.com/'); close(true); };
  }});
}

/* =====================================================================
   ACTIONS PANEL — registro de operaciones, reproducción, persistencia
   ===================================================================== */

const ACTIONS_LS_KEY = 'idc_editor_actions_v1';

/* ID generator (unique, sortable) */
let _actId = 0;
function actId() { return 'a_' + Date.now().toString(36) + '_' + (++_actId).toString(36); }

/* ---------- Operation registry ----------
   Each op: { label, exec(params, onDone?), recordable: true }
   onDone callback used for ops that wrap a modal (none here — ops execute directly)
*/
const ACTION_OPS = {
  // Filters direct
  'filter.grayscale':  { label: 'Escala de grises',   exec: () => _execFilter('grayscale') },
  'filter.sepia':      { label: 'Sepia',              exec: () => _execFilter('sepia') },
  'filter.invert':     { label: 'Invertir colores',   exec: () => _execFilter('invert') },
  'filter.sharpen':    { label: 'Enfocar',            exec: () => _execFilter('sharpen') },

  // Filters parametric
  'filter.brightness_contrast': {
    label: 'Brillo / Contraste',
    exec: (p) => _execImageFilter('Brillo / Contraste', (img) => {
      Filters.brightness(img, +p.b||0);
      Filters.contrast(img, +p.c||0);
    }),
  },
  'filter.hue_saturation': {
    label: 'Tono / Saturación',
    exec: (p) => _execImageFilter('Tono / Saturación', (img) => {
      if (+p.h) Filters.hue(img, +p.h);
      if (+p.s) Filters.saturation(img, +p.s);
    }),
  },
  'filter.posterize': {
    label: 'Posterizar',
    exec: (p) => _execImageFilter('Posterizar', (img) => Filters.posterize(img, +p.l||5)),
  },
  'filter.threshold': {
    label: 'Umbral',
    exec: (p) => _execImageFilter('Umbral', (img) => Filters.threshold(img, +p.t||128)),
  },
  'filter.blur': {
    label: 'Desenfoque',
    exec: (p) => _execImageFilter('Desenfoque', (img, w, h) => Filters.blur(img, +p.r||3, w, h)),
  },
  'filter.pixelate': {
    label: 'Pixelar',
    exec: (p) => _execImageFilter('Pixelar', (img, w, h) => Filters.pixelate(img, +p.s||8, w, h)),
  },
  'filter.noise': {
    label: 'Ruido',
    exec: (p) => _execImageFilter('Ruido', (img) => Filters.noise(img, +p.a||25)),
  },
  'filter.levels': {
    label: 'Niveles',
    exec: (p) => _execImageFilter('Niveles', (img) => Filters.levels(img, p)),
  },
  'filter.curves_all': {
    label: 'Curvas',
    exec: (p) => _execImageFilter('Curvas', (img) => {
      const c = (p && p.curves) || {};
      ['rgb','r','g','b'].forEach(ch => {
        const pts = c[ch];
        if (pts && pts.length>=2 && !_isIdentity(pts)) {
          Filters.curves(img, { channel: ch, points: pts });
        }
      });
    }),
  },

  // Transforms
  'transform.rotate':   { label: 'Rotar',           exec: (p) => rotate(+p.deg||90) },
  'transform.flip_h':   { label: 'Voltear horiz.',  exec: () => flipH() },
  'transform.flip_v':   { label: 'Voltear vert.',   exec: () => flipV() },
  'transform.resize_image':  { label: 'Tamaño imagen',  exec: (p) => resizeImage(+p.w, +p.h) },
  'transform.resize_canvas': { label: 'Tamaño lienzo',  exec: (p) => resizeCanvas(+p.w, +p.h, p.anchor||'center') },
  'transform.crop':     { label: 'Recortar a selección', exec: () => { if (State.selection) cropToSelection(); } },

  // Layers
  'layer.new':          { label: 'Nueva capa',     exec: () => addLayer() },
  'layer.duplicate':    { label: 'Duplicar capa',  exec: () => duplicateLayer() },
  'layer.delete':       { label: 'Eliminar capa',  exec: () => deleteLayer() },
  'layer.merge_down':   { label: 'Combinar abajo', exec: () => mergeDown() },
  'layer.merge_all':    { label: 'Acoplar imagen', exec: () => mergeAll() },
  'layer.lock':         { label: 'Bloquear capa', exec: () => { const L=activeLayer(); if(L){L.locked=true; renderLayers();} } },
  'layer.unlock':       { label: 'Desbloquear capa', exec: () => { const L=activeLayer(); if(L){L.locked=false; renderLayers();} } },
  'layer.move':         { label: 'Mover capa', exec: (p) => moveLayer(+p.direction||1) },
  'layer.set_opacity':  { label: 'Opacidad capa',  exec: (p) => _setLayerOpacity(+p.opacity) },
  'layer.set_blend':    { label: 'Modo fusión',    exec: (p) => _setLayerBlend(p.mode) },

  // Selection
  'select.all':         { label: 'Seleccionar todo', exec: () => selectAll() },
  'select.deselect':    { label: 'Deseleccionar',    exec: () => deselect() },
  'select.invert':      { label: 'Invertir sel.',    exec: () => invertSelection() },

  // Fill
  'edit.fill_fg':       { label: 'Rellenar c/ frontal', exec: () => fillSelection(State.fgColor) },
  'edit.fill_bg':       { label: 'Rellenar c/ fondo',   exec: () => fillSelection(State.bgColor) },

  // Export
  'export.png':         { label: 'Exportar PNG',  exec: () => exportImage('png') },
  'export.jpeg':        { label: 'Exportar JPG',  exec: () => exportImage('jpeg') },
  'export.webp':        { label: 'Exportar WebP', exec: () => exportImage('webp') },
};

/* Helpers used by ACTION_OPS */
function _execFilter(name) { applyFilter(name, { _replay: true }); }
function _execImageFilter(label, fn) {
  const L = activeLayer(); if (!L) return;
  const img = L.ctx.getImageData(0,0,L.canvas.width,L.canvas.height);
  fn(img, L.canvas.width, L.canvas.height);
  L.ctx.putImageData(img, 0, 0);
  redraw();
  historyPush(label);
}
function _setLayerOpacity(o) {
  const L = activeLayer(); if (!L) return;
  L.opacity = Math.max(0, Math.min(1, o > 1 ? o/100 : o));
  if (dom.layerOpacity) { dom.layerOpacity.value = Math.round(L.opacity*100); dom.layerOpacityVal.textContent = Math.round(L.opacity*100)+'%'; }
  redraw();
}
function _setLayerBlend(m) {
  const L = activeLayer(); if (!L) return;
  L.blendMode = m;
  if (dom.layerBlend) dom.layerBlend.value = m;
  redraw();
}

/* ---------- Recording ---------- */
function actionsCurrentlyRecording() {
  if (!State.actions.recordingId) return null;
  for (const set of State.actions.sets) {
    const a = set.actions.find(a => a.id === State.actions.recordingId);
    if (a) return a;
  }
  return null;
}

function recordOp(opId, params={}) {
  if (State.actions.playing) return; // don't record during playback
  const rec = actionsCurrentlyRecording();
  if (!rec) return;
  if (!ACTION_OPS[opId]) return;
  rec.steps.push({ op: opId, params: { ...params }, enabled: true });
  actionsRender();
  actionsPersist();
}

function actionsStartRecord() {
  // Need a selected action; if a step or set is selected, find/create a sibling
  let target = actionsFindSelected();
  if (!target || target.kind !== 'action') {
    // Try using first action of selected set; else create a new action
    const setNode = target && target.kind === 'set' ? target.set : (State.actions.sets[0] || actionsCreateSet('Mis acciones'));
    const newAct = actionsCreateAction(setNode, 'Acción ' + (setNode.actions.length+1));
    State.actions.selectedId = newAct.id;
    target = { kind: 'action', set: setNode, action: newAct };
  }
  State.actions.recordingId = target.action.id;
  dom.btnActionsRecord.classList.add('recording');
  dom.btnActionsStop.disabled = false;
  dom.btnActionsRecord.disabled = true;
  dom.recIndicator.hidden = false;
  showToast(`Grabando en "${target.action.name}"`, 'success');
  actionsRender();
}

function actionsStopRecord() {
  const rec = actionsCurrentlyRecording();
  State.actions.recordingId = null;
  dom.btnActionsRecord.classList.remove('recording');
  dom.btnActionsStop.disabled = true;
  dom.btnActionsRecord.disabled = false;
  dom.recIndicator.hidden = true;
  if (rec) showToast(`"${rec.name}" guardada (${rec.steps.length} pasos)`, 'success');
  actionsPersist();
  actionsRender();
}

/* ---------- Playback ---------- */
async function actionsPlay() {
  if (State.actions.playing) return;
  const target = actionsFindSelected();
  if (!target) return showToast('Selecciona una acción','error');

  let actionsToRun = [];
  if (target.kind === 'action') actionsToRun = [target.action];
  else if (target.kind === 'set') actionsToRun = target.set.actions.filter(a => a.enabled !== false);
  else if (target.kind === 'step') actionsToRun = [{ steps: [target.step], name: 'paso' }];

  if (!actionsToRun.length) return showToast('Nada para reproducir','error');

  State.actions.playing = true;
  dom.btnActionsPlay.disabled = true;
  let totalSteps = 0;
  try {
    for (const act of actionsToRun) {
      for (const step of act.steps) {
        if (step.enabled === false) continue;
        const op = ACTION_OPS[step.op];
        if (!op) { console.warn('Op desconocida:', step.op); continue; }
        try { op.exec(step.params || {}); } catch(e) { console.error('Error ejecutando', step.op, e); }
        totalSteps++;
        await new Promise(r => setTimeout(r, 30)); // small breathing room for redraw
      }
    }
    showToast(`Reproducidos ${totalSteps} paso${totalSteps===1?'':'s'}`, 'success');
  } finally {
    State.actions.playing = false;
    dom.btnActionsPlay.disabled = false;
  }
}

/* ---------- Tree management ---------- */
function actionsCreateSet(name='Nuevo conjunto') {
  const set = { id: actId(), name, expanded: true, actions: [] };
  State.actions.sets.push(set);
  actionsPersist();
  actionsRender();
  return set;
}

function actionsCreateAction(setNode, name='Nueva acción') {
  const act = { id: actId(), name, shortcut: '', expanded: true, enabled: true, steps: [] };
  setNode.actions.push(act);
  actionsPersist();
  return act;
}

function actionsNewActionPrompt() {
  let target = actionsFindSelected();
  let setNode;
  if (target && target.kind === 'set') setNode = target.set;
  else if (target && target.kind === 'action') setNode = target.set;
  else if (target && target.kind === 'step')   setNode = target.set;
  else setNode = State.actions.sets[0] || actionsCreateSet('Mis acciones');
  const name = prompt('Nombre de la acción:', 'Acción ' + (setNode.actions.length+1));
  if (!name) return;
  const a = actionsCreateAction(setNode, name);
  State.actions.selectedId = a.id;
  actionsPersist();
  actionsRender();
}

function actionsNewSetPrompt() {
  const name = prompt('Nombre del conjunto:', 'Conjunto ' + (State.actions.sets.length+1));
  if (!name) return;
  const s = actionsCreateSet(name);
  State.actions.selectedId = s.id;
  actionsRender();
}

function actionsFindSelected() {
  const id = State.actions.selectedId;
  if (!id) return null;
  for (const set of State.actions.sets) {
    if (set.id === id) return { kind: 'set', set };
    for (const action of set.actions) {
      if (action.id === id) return { kind: 'action', set, action };
      for (const step of action.steps) {
        if (step.id === id) return { kind: 'step', set, action, step };
      }
    }
  }
  return null;
}

function actionsDeleteSelected() {
  const t = actionsFindSelected();
  if (!t) return showToast('Nada seleccionado','error');
  let label;
  if (t.kind === 'step') {
    label = `paso "${ACTION_OPS[t.step.op]?.label || t.step.op}"`;
    t.action.steps = t.action.steps.filter(s => s !== t.step);
  } else if (t.kind === 'action') {
    label = `acción "${t.action.name}"`;
    if (!confirm(`¿Eliminar acción "${t.action.name}"?`)) return;
    t.set.actions = t.set.actions.filter(a => a !== t.action);
    if (State.actions.recordingId === t.action.id) actionsStopRecord();
  } else if (t.kind === 'set') {
    label = `conjunto "${t.set.name}"`;
    if (!confirm(`¿Eliminar conjunto "${t.set.name}" y todas sus acciones?`)) return;
    State.actions.sets = State.actions.sets.filter(s => s !== t.set);
  }
  State.actions.selectedId = null;
  actionsPersist();
  actionsRender();
  showToast(`Eliminado: ${label}`,'success');
}

function actionsRenameSelected() {
  const t = actionsFindSelected();
  if (!t || t.kind === 'step') return;
  const node = t.kind === 'set' ? t.set : t.action;
  const name = prompt('Nuevo nombre:', node.name);
  if (!name) return;
  node.name = name;
  actionsPersist();
  actionsRender();
}

/* Ensure step ids exist (older imports / record adds without id) */
function _ensureIds() {
  for (const set of State.actions.sets) {
    if (!set.id) set.id = actId();
    for (const action of set.actions) {
      if (!action.id) action.id = actId();
      for (const step of action.steps) {
        if (!step.id) step.id = actId();
      }
    }
  }
}

/* ---------- Render ---------- */
function actionsRender() {
  if (!dom.actionsTree) return;
  _ensureIds();
  const tree = dom.actionsTree;
  tree.classList.toggle('button-mode', !!State.actions.buttonMode);
  tree.innerHTML = '';

  const sel = State.actions.selectedId;
  const recId = State.actions.recordingId;

  if (!State.actions.sets.length) {
    tree.innerHTML = '<div style="padding:14px; text-align:center; color:var(--text-faint); font-size:10px">Sin acciones todavía.<br>Pulsa <strong>+</strong> para crear una.</div>';
    return;
  }

  for (const set of State.actions.sets) {
    const setRow = document.createElement('div');
    setRow.className = 'act-row set' + (sel===set.id?' selected':'') + (set.expanded===false?' collapsed':'');
    setRow.dataset.id = set.id; setRow.dataset.kind = 'set';
    setRow.innerHTML = `
      <span class="act-toggle on" title="Habilitado"></span>
      <span class="act-caret">▾</span>
      <span class="act-name">${escapeHtml(set.name)}</span>
    `;
    tree.appendChild(setRow);

    if (set.expanded === false) continue;

    for (const action of set.actions) {
      const actRow = document.createElement('div');
      const isRec = recId === action.id;
      actRow.className = 'act-row action' + (sel===action.id?' selected':'') + (action.expanded===false?' collapsed':'');
      actRow.dataset.id = action.id; actRow.dataset.kind = 'action';
      actRow.innerHTML = `
        <span class="act-toggle ${action.enabled!==false?'on':'off'}" data-toggle title="Habilitado"></span>
        <span class="act-caret">▾</span>
        <span class="act-name">${isRec?'● ':''}${escapeHtml(action.name)}</span>
        ${action.shortcut?`<span class="act-shortcut">${escapeHtml(action.shortcut)}</span>`:''}
      `;
      if (isRec) actRow.style.color = '#ff5050';
      tree.appendChild(actRow);

      if (action.expanded === false) continue;

      for (const step of action.steps) {
        const meta = ACTION_OPS[step.op];
        const stepRow = document.createElement('div');
        stepRow.className = 'act-row step' + (sel===step.id?' selected':'');
        stepRow.dataset.id = step.id; stepRow.dataset.kind = 'step';
        const paramsStr = _formatParams(step.params);
        stepRow.innerHTML = `
          <span class="act-toggle ${step.enabled!==false?'on':'off'}" data-toggle></span>
          <span class="act-name">${escapeHtml(meta?meta.label:step.op)}${paramsStr?` <span style="color:var(--text-faint)">(${paramsStr})</span>`:''}</span>
        `;
        tree.appendChild(stepRow);
      }
    }
  }

  // Bind click events
  tree.querySelectorAll('.act-row').forEach(row => {
    row.onclick = (e) => {
      if (e.target.dataset.toggle !== undefined || e.target.classList.contains('act-toggle')) {
        // Toggle enable/expand handled below
        return;
      }
      // In button mode, click on action = play
      if (State.actions.buttonMode && row.dataset.kind === 'action') {
        State.actions.selectedId = row.dataset.id;
        actionsPlay();
        return;
      }
      // Click caret or name? Toggle expand for set/action; select for step
      if (e.target.classList.contains('act-caret')) {
        const t = _findById(row.dataset.id);
        if (t && (t.kind==='set' || t.kind==='action')) {
          const node = t.kind==='set'?t.set:t.action;
          node.expanded = !(node.expanded !== false);
          actionsPersist();
          actionsRender();
          return;
        }
      }
      State.actions.selectedId = row.dataset.id;
      actionsRender();
    };
    row.ondblclick = (e) => {
      e.stopPropagation();
      const t = _findById(row.dataset.id);
      if (!t) return;
      if (t.kind === 'action') actionsPlay();
      else if (t.kind === 'set') {
        State.actions.selectedId = row.dataset.id;
        actionsRenameSelected();
      }
    };
    const tg = row.querySelector('[data-toggle]');
    if (tg) tg.onclick = (e) => {
      e.stopPropagation();
      const t = _findById(row.dataset.id);
      if (!t) return;
      const node = t.step || t.action || t.set;
      node.enabled = node.enabled === false;
      actionsPersist();
      actionsRender();
    };
  });
}

function _findById(id) {
  for (const set of State.actions.sets) {
    if (set.id === id) return { kind:'set', set };
    for (const action of set.actions) {
      if (action.id === id) return { kind:'action', set, action };
      for (const step of action.steps) {
        if (step.id === id) return { kind:'step', set, action, step };
      }
    }
  }
  return null;
}

function _formatParams(p) {
  if (!p) return '';
  const keys = Object.keys(p).filter(k => !k.startsWith('_'));
  if (!keys.length) return '';
  return keys.map(k => `${k}:${typeof p[k]==='number'?(+p[k].toFixed(2)):p[k]}`).join(', ');
}

function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

/* ---------- Persistence ---------- */
function actionsPersist() {
  try {
    const safe = { sets: State.actions.sets, buttonMode: State.actions.buttonMode };
    localStorage.setItem(ACTIONS_LS_KEY, JSON.stringify(safe));
  } catch(e) { /* localStorage may be blocked */ }
}

function actionsLoad() {
  try {
    const raw = localStorage.getItem(ACTIONS_LS_KEY);
    if (raw) {
      const data = JSON.parse(raw);
      if (Array.isArray(data.sets)) {
        State.actions.sets = data.sets;
        State.actions.buttonMode = !!data.buttonMode;
        _ensureIds();
        return true;
      }
    }
  } catch(e) {}
  return false;
}

/* ---------- Import / Export JSON ---------- */
function actionsExport() {
  const data = JSON.stringify({ format: 'idc-actions-v1', sets: State.actions.sets }, null, 2);
  const blob = new Blob([data], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  downloadDataURL(url, 'idc-acciones.json');
  setTimeout(()=>URL.revokeObjectURL(url), 1000);
  showToast('Acciones exportadas','success');
}

function actionsImport() {
  const inp = document.createElement('input');
  inp.type = 'file'; inp.accept = '.json,application/json';
  inp.onchange = () => {
    const f = inp.files[0]; if (!f) return;
    const reader = new FileReader();
    reader.onload = e => {
      try {
        const data = JSON.parse(e.target.result);
        if (!data || !Array.isArray(data.sets)) throw new Error('Formato inválido');
        // Append rather than replace
        for (const s of data.sets) {
          s.id = actId();
          for (const a of s.actions||[]) {
            a.id = actId();
            for (const st of a.steps||[]) st.id = actId();
          }
          State.actions.sets.push(s);
        }
        actionsPersist();
        actionsRender();
        showToast(`Importado: ${data.sets.length} conjunto(s)`,'success');
      } catch(err) {
        showToast('Archivo inválido: '+err.message,'error');
      }
    };
    reader.readAsText(f);
  };
  inp.click();
}

/* ---------- Wire up panel buttons ---------- */
function actionsBindUI() {
  if (!dom.btnActionsRecord) return;
  dom.btnActionsRecord.onclick = actionsStartRecord;
  dom.btnActionsStop.onclick   = actionsStopRecord;
  dom.btnActionsPlay.onclick   = actionsPlay;

    State.actions.buttonMode = !State.actions.buttonMode;

  dom.btnActionsExport.onclick = actionsExport;

/* ---------- FILE IO ---------- */
function openImageFile(file, asLayer=false) {
  const reader = new FileReader();
  reader.onload = (e) => {
    const img = new Image();
    img.onload = () => {
      if (asLayer && State.doc) {
        const L = new Layer(State.doc.width, State.doc.height, file.name.replace(/\.[^.]+$/, ''));
        // Center the image on the layer
        const x = (State.doc.width - img.width) / 2;
        const y = (State.doc.height - img.height) / 2;
        L.ctx.drawImage(img, x, y);
        State.doc.layers.push(L);
        State.doc.activeIndex = State.doc.layers.length - 1;
        renderLayers(); redraw();
        historyPush('Importar como capa');
        showToast('Imagen importada como capa', 'success');
      } else {
        State.doc = createDocument(img.width, img.height, file.name, null);
        State.doc.layers[0].ctx.clearRect(0,0,img.width,img.height);
        State.doc.layers[0].ctx.drawImage(img, 0, 0);
        State.history = []; State.historyIndex = -1;
        State.selection = null;
        resizeMainCanvas();
        renderLayers();
        historyPush('Abrir');
        dom.statusDoc.textContent = `${img.width} × ${img.height}`;
        fitToScreen();
        showToast(`${file.name} cargada`, 'success');
      }
    };
    img.src = e.target.result;
  };
  reader.readAsDataURL(file);
}

function openAsLayer() {
  if (!State.doc) { showToast('Primero abre o crea un documento','error'); return; }
  const tmp = document.createElement('input');
  tmp.type = 'file'; tmp.accept = 'image/*';
  tmp.onchange = (e) => { if (e.target.files[0]) openImageFile(e.target.files[0], true); };
  tmp.click();
}

function flattenForExport() {
  const c = document.createElement('canvas');
  c.width = State.doc.width; c.height = State.doc.height;
  const cx = c.getContext('2d');
  for (const L of State.doc.layers) {
    if (!L.visible) continue;
    cx.save();
    cx.globalAlpha = L.opacity;
    cx.globalCompositeOperation = L.blendMode;
    cx.drawImage(L.canvas, 0, 0);
    cx.restore();
  }
  return c;
}

function exportImage(format='png') {
  if (!State.doc) return;
  const c = flattenForExport();
  // For JPG, fill bg white first
  if (format === 'jpeg') {
    const tmp = document.createElement('canvas');
    tmp.width = c.width; tmp.height = c.height;
    const tcx = tmp.getContext('2d');
    tcx.fillStyle = '#fff'; tcx.fillRect(0,0,c.width,c.height);
    tcx.drawImage(c, 0, 0);
    downloadDataURL(tmp.toDataURL('image/jpeg', 0.92), `${State.doc.name}.jpg`);
  } else if (format === 'webp') {
    downloadDataURL(c.toDataURL('image/webp', 0.92), `${State.doc.name}.webp`);
  } else {
    downloadDataURL(c.toDataURL('image/png'), `${State.doc.name}.png`);
  }
  showToast(`Guardado como ${format.toUpperCase()}`, 'success');
  recordOp('export.' + format, {});
}

function exportLayer() {
  const L = activeLayer();
  if (!L) return;
  downloadDataURL(L.canvas.toDataURL('image/png'), `${L.name}.png`);
  showToast(`Capa "${L.name}" exportada`, 'success');
}

function downloadDataURL(url, name) {
  const a = document.createElement('a');
  a.href = url; a.download = name;
  document.body.appendChild(a); a.click(); a.remove();
}

function closeDoc() {
  if (State.isDirty && !confirm('¿Cerrar documento? Los cambios no guardados se perderán.')) return;
  State.doc = null;
  State.history = []; State.historyIndex = -1;
  State.selection = null;
  ctxMain.clearRect(0,0,dom.mainCanvas.width, dom.mainCanvas.height);
  ctxOverlay.clearRect(0,0,dom.overlay.width,dom.overlay.height);
  dom.stage.style.width = '0'; dom.stage.style.height = '0';
  dom.statusDoc.textContent = '— × —';
  renderLayers(); renderHistory();
}

function fillSelection(color) {
  const L = activeLayer();
  if (!L) return;
  L.ctx.save();
  L.ctx.fillStyle = color;
  if (State.selection) {
    const s = State.selection;
    L.ctx.fillRect(s.x, s.y, s.w, s.h);
  } else {
    L.ctx.fillRect(0,0,L.canvas.width,L.canvas.height);
  }
  L.ctx.restore();
  redraw();
  historyPush('Rellenar');
  // Graba usando fg o bg según coincidencia, para que el replay siga la paleta actual
  const normalized = (color||'').toLowerCase();
  if (normalized === (State.fgColor||'').toLowerCase()) recordOp('edit.fill_fg', {});
  else if (normalized === (State.bgColor||'').toLowerCase()) recordOp('edit.fill_bg', {});
  else recordOp('edit.fill_fg', {}); // fallback
}

/* ---------- TOAST ---------- */
let toastTimer = null;
function showToast(msg, type='') {
  dom.toast.textContent = msg;
  dom.toast.className = 'show ' + type;
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => dom.toast.className = type, 2500);
}

/* ---------- FULLSCREEN ---------- */
function toggleFullscreen() {
  if (!document.fullscreenElement) {
    document.documentElement.requestFullscreen?.();
  } else {
    document.exitFullscreen?.();
  }
}

/* ---------- POINTER EVENTS ---------- */
function attachPointer() {
  let dragging = false;
  // Herramientas que pintan/borran sobre la capa activa y deben respetar el bloqueo
  const PAINT_TOOLS = new Set(['brush','pencil','eraser','bucket','text','rect','ellipse','line']);
  function onDown(e) {
    if (!State.doc) return;
    if (e.target !== dom.mainCanvas && e.target !== dom.overlay) return;
    e.preventDefault();
    // Bloqueo de capa
    const L = activeLayer();
    if (L && L.locked && !State.spaceDown && PAINT_TOOLS.has(State.tool)) {
      showToast(`Capa "${L.name}" bloqueada`, 'error');
      return;
    }
    dom.mainCanvas.setPointerCapture?.(e.pointerId);
    dragging = true;
    const p = getPos(e);
    // Space = temporary hand tool
    if (State.spaceDown) {
      Tools.hand.onDown(p, e); return;
    }
    Tools[State.tool]?.onDown(p, e);
  }
  function onMove(e) {
    if (State.doc) {
      const p = getPos(e);
      dom.statusCoords.textContent = `x: ${Math.floor(p.x)}, y: ${Math.floor(p.y)}`;
    }
    if (!dragging) return;
    const p = getPos(e);
    if (State.spaceDown) { Tools.hand.onMove(p, e); return; }
    Tools[State.tool]?.onMove(p, e);
  }
  function onUp(e) {
    if (!dragging) return;
    dragging = false;
    const p = State.doc ? getPos(e) : {x:0,y:0};
    if (State.spaceDown) { Tools.hand.onUp(p, e); return; }
    Tools[State.tool]?.onUp(p, e);
  }
  dom.overlay.addEventListener('pointerdown', onDown);
  window.addEventListener('pointermove', onMove);
  window.addEventListener('pointerup', onUp);
  // Make overlay receive pointer events
  dom.overlay.style.pointerEvents = 'auto';

  // Wheel zoom (Ctrl + wheel) and pan
  dom.canvasScroll.addEventListener('wheel', (e) => {
    if (e.ctrlKey || e.metaKey) {
      e.preventDefault();
      const p = getPos(e);
      const factor = e.deltaY < 0 ? 1.1 : 1/1.1;
      setZoom(State.zoom * factor, p);
    }
  }, { passive: false });

  // Track scroll for ruler updates
  dom.canvasScroll.addEventListener('scroll', () => {
    drawRulers();
  });
}

/* ---------- KEYBOARD ---------- */
function attachKeyboard() {
  const TOOL_KEYS = {
    v:'move', m:'marquee', l:'lasso', c:'crop', i:'eyedropper',
    b:'brush', n:'pencil', e:'eraser', g:'bucket', t:'text',
    u:'rect', h:'hand', z:'zoom'
  };
  document.addEventListener('keydown', (e) => {
    // Ignore if typing in input
    if (e.target.matches('input, select, textarea')) return;
    const k = e.key.toLowerCase();
    State.spaceDown = e.code === 'Space' || State.spaceDown;
    State.altDown = e.altKey;
    State.shiftDown = e.shiftKey;
    State.ctrlDown = e.ctrlKey || e.metaKey;
    if (e.code === 'Space') { e.preventDefault(); document.body.classList.add('cursor-hand'); return; }
    if (e.ctrlKey || e.metaKey) {
      if (k === 'z') { e.preventDefault(); e.shiftKey ? redo() : undo(); return; }
      if (k === 'y') { e.preventDefault(); redo(); return; }
      if (k === 'n' && e.shiftKey) { e.preventDefault(); addLayer(); return; }
      if (k === 'n') { e.preventDefault(); modalNewDoc(); return; }
      if (k === 'o') { e.preventDefault(); dom.fileInput.click(); return; }
      if (k === 's') { e.preventDefault(); exportImage('png'); return; }
      if (k === 'a') { e.preventDefault(); selectAll(); return; }
      if (k === 'd') { e.preventDefault(); deselect(); return; }
      if (k === 'i') { e.preventDefault(); applyFilter('invert'); return; }
      if (k === 'l') { e.preventDefault(); modalLevels(); return; }
      if (k === 'm') { e.preventDefault(); modalCurves(); return; }
      if (k === '[') { e.preventDefault(); moveLayer(-1); return; }
      if (k === ']') { e.preventDefault(); moveLayer(+1); return; }
      if (k === '/') { e.preventDefault(); toggleLockLayer(); return; }
      if (k === 'j') { e.preventDefault(); duplicateLayer(); return; }
      if (k === 'e') { e.preventDefault(); mergeDown(); return; }
      if (k === 'c') { e.preventDefault(); copySelection(); return; }
      if (k === 'v') { e.preventDefault(); pasteSelection(); return; }
      if (k === 'x') { e.preventDefault(); copySelection(); deleteSelection(); return; }
      if (k === '+' || k === '=') { e.preventDefault(); setZoom(State.zoom*1.5); return; }
      if (k === '-') { e.preventDefault(); setZoom(State.zoom/1.5); return; }
      if (k === '0') { e.preventDefault(); fitToScreen(); return; }
      if (k === '1') { e.preventDefault(); actualPixels(); return; }
      return;
    }
    if (k === 'delete' || e.key === 'Backspace' || k === 'del') {
      if (State.selection) { deleteSelection(); e.preventDefault(); }
      return;
    }
    if (k === 'x') { swapColors(); return; }
    if (k === 'd') { resetColors(); return; }
    if (k === ']') { State.brushSize = Math.min(200, State.brushSize+2); renderOptionsBar(); return; }
    if (k === '[') { State.brushSize = Math.max(1, State.brushSize-2); renderOptionsBar(); return; }
    if (k === '?' || (e.shiftKey && k === '/')) { modalShortcuts(); return; }
    if (k === 'f11' || e.key === 'F11') { e.preventDefault(); toggleFullscreen(); return; }
    if (k === 'enter' && State.tool === 'crop' && State.selection) { cropToSelection(); return; }
    if (k === 'escape') { closeAllMenus(); deselect(); return; }
    if (TOOL_KEYS[k]) { setTool(TOOL_KEYS[k]); return; }
  });
  document.addEventListener('keyup', (e) => {
    if (e.code === 'Space') {
      State.spaceDown = false;
      document.body.classList.remove('cursor-hand');
    }
    State.altDown = e.altKey; State.shiftDown = e.shiftKey;
  });
}

/* ---------- PWA INSTALL ---------- */
let deferredPrompt = null;
function attachInstall() {
  window.addEventListener('beforeinstallprompt', (e) => {
    e.preventDefault();
    deferredPrompt = e;
    dom.btnInstall.hidden = false;
  });
  dom.btnInstall.addEventListener('click', triggerInstall);
  window.addEventListener('appinstalled', () => {
    dom.btnInstall.hidden = true;
    showToast('IDC Editor instalado', 'success');
  });
}
function triggerInstall() {
  if (deferredPrompt) {
    deferredPrompt.prompt();
    deferredPrompt.userChoice.then(() => { deferredPrompt = null; dom.btnInstall.hidden = true; });
  } else {
    showToast('Para instalar: usa el menú de tu navegador → "Instalar app" o "Añadir a pantalla de inicio"');
  }
}

/* ---------- ONLINE STATUS ---------- */
function updateOnline() {
  if (navigator.onLine) {
    dom.onlineDot.classList.remove('offline');
    dom.onlineDot.title = 'En línea';
  } else {
    dom.onlineDot.classList.add('offline');
    dom.onlineDot.title = 'Sin conexión (la app funciona offline)';
  }
}

/* ---------- INIT ---------- */
function init() {
  // Color picker
  dom.colorPicker.addEventListener('input', (e) => setColor(e.target.value, 'fg'));
  dom.hexInput.addEventListener('change', (e) => setColor(e.target.value, 'fg'));
  dom.rIn.addEventListener('input', () => setColor(rgbToHex(+dom.rIn.value, +dom.gIn.value, +dom.bIn.value), 'fg'));
  dom.gIn.addEventListener('input', () => setColor(rgbToHex(+dom.rIn.value, +dom.gIn.value, +dom.bIn.value), 'fg'));
  dom.bIn.addEventListener('input', () => setColor(rgbToHex(+dom.rIn.value, +dom.gIn.value, +dom.bIn.value), 'fg'));
  dom.fgColor.addEventListener('click', () => dom.colorPicker.click());
  dom.bgColor.addEventListener('click', () => {
    const tmp = document.createElement('input');
    tmp.type='color'; tmp.value = State.bgColor;
    tmp.oninput = (e) => setColor(e.target.value, 'bg');
    tmp.click();
  });
  dom.swapColors.addEventListener('click', swapColors);
  dom.resetColors.addEventListener('click', resetColors);

  // Swatches
  $$('#idcSwatches .sw').forEach(b => {
    b.addEventListener('click', () => setColor(b.dataset.c, 'fg'));
    b.addEventListener('contextmenu', (e) => { e.preventDefault(); setColor(b.dataset.c, 'bg'); });
  });

  // Tools
  $$('.tool').forEach(b => b.addEventListener('click', () => setTool(b.dataset.tool)));

  // Layer panel buttons
  $('#btnAddLayer').addEventListener('click', addLayer);
  $('#btnDuplicateLayer').addEventListener('click', duplicateLayer);
  $('#btnDeleteLayer').addEventListener('click', deleteLayer);
  dom.layerOpacity.addEventListener('input', (e) => {
    if (activeLayer()) {
      activeLayer().opacity = +e.target.value/100;
      dom.layerOpacityVal.textContent = e.target.value+'%';
      redraw();
    }
  });
  dom.layerOpacity.addEventListener('change', () => historyPush('Opacidad de capa'));
  dom.layerBlend.addEventListener('change', (e) => {
    if (activeLayer()) {
      activeLayer().blendMode = e.target.value;
      redraw();
      historyPush('Modo de fusión');
    }
  });

  // Menus
  $$('.menu-btn').forEach(b => {
    b.addEventListener('click', (e) => {
      e.stopPropagation();
      if (b.classList.contains('open')) closeAllMenus();
      else openMenu(b.dataset.menu, b);
    });
  });
  document.addEventListener('click', (e) => {
    if (!e.target.closest('.menu-panel') && !e.target.closest('.menu-btn')) closeAllMenus();
  });

  // File input
  dom.fileInput.addEventListener('change', (e) => {
    if (e.target.files[0]) openImageFile(e.target.files[0], false);
    e.target.value = '';
  });

  // Drag and drop
  document.addEventListener('dragover', (e) => e.preventDefault());
  document.addEventListener('drop', (e) => {
    e.preventDefault();
    if (e.dataTransfer.files[0]) {
      openImageFile(e.dataTransfer.files[0], !!State.doc);
    }
  });

  // Pointer + keyboard
  attachPointer();
  attachKeyboard();
  attachInstall();

  // Online
  updateOnline();
  window.addEventListener('online', updateOnline);
  window.addEventListener('offline', updateOnline);

  // Resize listener
  window.addEventListener('resize', () => { drawRulers(); });

  // Init UI
  setTool('brush');
  setColor('#1e1e1e', 'fg');
  setColor('#ffffff', 'bg');
  renderLayers();
  renderHistory();
  renderOptionsBar();

  // Actions panel
  actionsBindUI();
  actionsLoad();
  actionsLoadFactoryPresets(); // solo añade "Presets IDC" si no existe ya
  actionsRender();

  // Show welcome
  setTimeout(() => {
    if (!State.doc) modalNewDoc();
  }, 300);
}

// Expose for inline handlers
window.setZoom = setZoom;
window.fitToScreen = fitToScreen;
window.actualPixels = actualPixels;
window.selectAll = selectAll;
window.invertSelection = invertSelection;
window.deselect = deselect;
window.drawSelectionOverlay = drawSelectionOverlay;
window.State = State;

document.addEventListener('DOMContentLoaded', init);
</script>
<script>
// Service Worker — los navegadores modernos NO permiten registrar un SW desde
// una URL blob: por seguridad, así que usamos un sw.js externo opcional.
// Si el archivo existe junto al HTML, se registra; si no, la app sigue
// funcionando sin offline. El código del SW queda expuesto en window.__IDC_SW__
// para descargarlo desde el menú Archivo.
window.__IDC_SW__ = "// IDC Editor \u2014 Service Worker\n// Estrategia cache-first para single-file PWA. Como toda la app vive en una\n// sola URL (./ o index.html), el SW guarda esa p\u00e1gina y la sirve siempre,\n// permitiendo trabajar 100% offline una vez instalada.\n\nconst CACHE_NAME = 'idc-editor-v1';\nconst APP_SHELL = ['./'];\n\nself.addEventListener('install', (event) => {\n  event.waitUntil(\n    caches.open(CACHE_NAME)\n      .then((cache) => cache.addAll(APP_SHELL))\n      .then(() => self.skipWaiting())\n      .catch((err) => console.warn('[IDC SW] precache failed:', err))\n  );\n});\n\nself.addEventListener('activate', (event) => {\n  event.waitUntil(\n    caches.keys().then((keys) =>\n      Promise.all(\n        keys.filter((k) => k !== CACHE_NAME).map((k) => caches.delete(k))\n      )\n    ).then(() => self.clients.claim())\n  );\n});\n\nself.addEventListener('fetch', (event) => {\n  const req = event.request;\n\n  // Solo manejamos GET; deja pasar POST, etc.\n  if (req.method !== 'GET') return;\n\n  // Ignora esquemas no http (chrome-extension, blob:, data:, etc.)\n  const url = new URL(req.url);\n  if (url.protocol !== 'http:' && url.protocol !== 'https:') return;\n\n  event.respondWith(\n    caches.match(req).then((cached) => {\n      if (cached) return cached;\n\n      return fetch(req).then((resp) => {\n        // Cachea respuestas v\u00e1lidas mismo-origen para uso futuro\n        if (resp && resp.ok && url.origin === self.location.origin) {\n          const clone = resp.clone();\n          caches.open(CACHE_NAME).then((cache) => cache.put(req, clone));\n        }\n        return resp;\n      }).catch(() => {\n        // Si no hay red y la solicitud es navegacional, devuelve la app shell\n        if (req.mode === 'navigate') {\n          return caches.match('./');\n        }\n        return new Response('', { status: 504, statusText: 'Offline' });\n      });\n    })\n  );\n});\n\n// Permite a la app pedir actualizaci\u00f3n inmediata\nself.addEventListener('message', (event) => {\n  if (event.data && event.data.type === 'SKIP_WAITING') {\n    self.skipWaiting();\n  }\n});\n";
(function(){
  if (location.protocol === 'file:') {
    console.info('IDC Editor: el Service Worker requiere HTTP(S). Sirve el archivo desde un servidor local para soporte offline.');
    return;
  }
  if (!('serviceWorker' in navigator)) return;
  navigator.serviceWorker.register('./sw.js').then(reg => {
    console.log('[IDC Editor] SW registrado:', reg.scope);
  }).catch(err => {
    console.info('[IDC Editor] sw.js no encontrado junto al HTML. Descárgalo desde Archivo → Descargar Service Worker (PWA) y colócalo en la misma carpeta. Detalle:', err.message);
  });
})();
</script>
